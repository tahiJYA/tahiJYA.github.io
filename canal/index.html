<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo de WhatsApp</title>
    <meta name="description" content="Únete al grupo empresarial más importante de México">

    <link rel="icon" href="assets/img/icono.png" type="img/png">

    <link rel="stylesheet" href="assets/styles/main.css">

    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <main class="contenedor_main">
        <div class="contenedor_logo">
            <img src="assets/img/logo_50.png" alt="" title="" class="imagen_logo">
        </div>

        <div class="contenedor_main_seccion_1">
            <img src="assets/img/fondo.png" alt="" title="" class="imagen_fondo">
        </div>
        <div class="contenedor_main_seccion_2">
            <p class="texto_1 texto-universal-section">¡TE FALTA UN PASO!</p>
            <p class="texto_2">Estás a un paso de formar parte del grupo empresarial más importante de México</p>

            <div class="contenedor_boton">
                <p class="texto_3">ÚNETE DANDO CLICK A ESTE BOTÓN →</p>
                <button class="boton_1">
                    <a href="https://chat.whatsapp.com/DVOkf2yjzNz0fRSSBr4BQd" class="enlace">
                        <i class="fa-brands fa-whatsapp"></i>
                        UNIRME
                    </a>
                </button>
            </div>
            <p class="texto_4">75% de los cupos llenos</p>
            <div class="barra_de_progreso">
                <div class="progreso">
                    <p class="texto_5">75%</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
